<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro E-Commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>MyShop</h1>
    <div class="cart">
        🛒 Cart (<span id="cart-count">0</span>)
    </div>
</header>

<section class="products">

    <div class="product">
        <img src="images/product1.jpg">
        <h3>Product 1</h3>
        <p>$50</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
        <img src="images/product2.jpg">
        <h3>Product 2</h3>
        <p>$80</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
        <img src="images/product3.jpg">
        <h3>Product 3</h3>
        <p>$120</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

</section>

<script src="script.js"></script>
</body>
</html>
